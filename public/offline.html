<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GIET Confessions — Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;background:#0d0008;color:#fff0f5;
  font-family:'DM Sans',system-ui,sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px 24px;
  background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(192,20,76,0.3) 0%,transparent 65%),#0d0008;
}
.icon{font-size:4rem;margin-bottom:24px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
h1{font-size:1.8rem;font-weight:700;margin-bottom:10px;}
p{color:rgba(255,200,220,0.6);font-size:0.95rem;line-height:1.6;max-width:340px;margin-bottom:32px;}
.retry{
  background:linear-gradient(135deg,#ff2d6f,#c0144c);
  border:none;color:#fff;border-radius:40px;
  padding:13px 32px;font-size:0.95rem;font-weight:700;
  cursor:pointer;font-family:inherit;
  box-shadow:0 6px 24px rgba(255,45,111,0.4);
}
.retry:hover{transform:scale(1.05);}
.tip{margin-top:24px;font-size:0.72rem;color:rgba(255,200,220,0.35);}
</style>
</head>
<body>
  <span class="icon">📡</span>
  <h1>You're offline</h1>
  <p>GIET Confessions needs internet to load confessions and send your thoughts. Connect and try again.</p>
  <button class="retry" onclick="window.location.reload()">Try again ↻</button>
  <p class="tip">Tip: Add this app to your home screen for faster loading next time.</p>
</body>
</html>
